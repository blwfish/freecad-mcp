name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pin to a specific weekly build for reproducibility
  FREECAD_WEEKLY: "weekly-2026.04.01"

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pytest-timeout

      - name: Cache FreeCAD AppImage
        id: cache-freecad
        uses: actions/cache@v4
        with:
          path: ~/freecad-appimage
          key: freecad-${{ env.FREECAD_WEEKLY }}-x86_64

      - name: Download FreeCAD AppImage
        if: steps.cache-freecad.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/freecad-appimage
          cd ~/freecad-appimage

          # Download the weekly AppImage + checksum from FreeCAD GitHub releases
          gh release download "$FREECAD_WEEKLY" \
            --repo FreeCAD/FreeCAD \
            --pattern '*Linux-x86_64.AppImage' \
            --pattern '*Linux-x86_64.AppImage-SHA256.txt' \
            --dir .

          APPIMAGE=$(ls *Linux-x86_64.AppImage | head -1)
          sha256sum -c "${APPIMAGE}-SHA256.txt"
          chmod +x "$APPIMAGE"

          # Extract — AppImage requires FUSE which isn't available in CI
          "./$APPIMAGE" --appimage-extract
          rm "$APPIMAGE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up FreeCAD environment
        run: |
          SQUASHFS="$HOME/freecad-appimage/squashfs-root"

          # AppRun sets up PYTHONHOME, PATH_TO_FREECAD_LIBDIR, etc.
          # Create a wrapper so the test conftest can call freecadcmd like a normal binary.
          printf '#!/bin/bash\nexec "%s/AppRun" freecadcmd "$@"\n' "$SQUASHFS" \
            > ~/freecad-appimage/freecadcmd-wrapper.sh
          chmod +x ~/freecad-appimage/freecadcmd-wrapper.sh

          # Install AICopilot module into AppImage's FreeCAD Mod directory
          # so FreeCAD's Init.py adds it to sys.path automatically.
          ln -sfn "${{ github.workspace }}/AICopilot" "$SQUASHFS/usr/Mod/AICopilot"

          echo "FREECAD_MCP_FREECAD_BIN=$HOME/freecad-appimage/freecadcmd-wrapper.sh" >> "$GITHUB_ENV"
          echo "FREECAD_MCP_MODULE_DIR=${{ github.workspace }}/AICopilot" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v -rs --timeout=120
        timeout-minutes: 5
