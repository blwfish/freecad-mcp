name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pin to a specific weekly build for reproducibility
  FREECAD_WEEKLY: "weekly-2026.04.01"

jobs:
  integration:
    runs-on: ubuntu-latest
    # Only run on Python 3.12 — headless FreeCAD bundles its own Python,
    # but we need a system Python for pytest and the test harness.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pytest-timeout

      - name: Cache FreeCAD AppImage
        id: cache-freecad
        uses: actions/cache@v4
        with:
          path: ~/freecad-appimage
          key: freecad-${{ env.FREECAD_WEEKLY }}-x86_64

      - name: Download FreeCAD AppImage
        if: steps.cache-freecad.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/freecad-appimage
          cd ~/freecad-appimage

          # Download the weekly AppImage + checksum from FreeCAD GitHub releases
          gh release download "$FREECAD_WEEKLY" \
            --repo FreeCAD/FreeCAD \
            --pattern '*Linux-x86_64.AppImage' \
            --pattern '*Linux-x86_64.AppImage-SHA256.txt' \
            --dir .

          APPIMAGE=$(ls *Linux-x86_64.AppImage | head -1)

          # Verify checksum
          sha256sum -c "${APPIMAGE}-SHA256.txt"

          chmod +x "$APPIMAGE"

          # Extract — AppImage requires FUSE which isn't available in CI
          "./$APPIMAGE" --appimage-extract
          rm "$APPIMAGE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Locate FreeCADCmd
        id: freecad
        run: |
          SQUASHFS=~/freecad-appimage/squashfs-root

          # AppImage puts binaries in usr/bin/ (lowercase names)
          for name in FreeCADCmd freecadcmd FreeCAD freecad; do
            FOUND=$(find "$SQUASHFS" -name "$name" -type f | head -1)
            if [ -n "$FOUND" ]; then
              echo "Found $name at: $FOUND"
              echo "bin=$FOUND" >> "$GITHUB_OUTPUT"
              "$FOUND" --version || true
              exit 0
            fi
          done

          echo "::error::No FreeCAD binary found in extracted AppImage"
          ls "$SQUASHFS/usr/bin/" 2>/dev/null || true
          exit 1

      - name: Deploy AICopilot module for headless server
        run: |
          # The headless server needs the AICopilot module on FreeCAD's path.
          # Point FREECAD_MCP_MODULE_DIR to our repo's AICopilot directory.
          echo "FREECAD_MCP_MODULE_DIR=${{ github.workspace }}/AICopilot" >> "$GITHUB_ENV"
          echo "FREECAD_MCP_FREECAD_BIN=${{ steps.freecad.outputs.bin }}" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: |
          echo "FREECAD_MCP_FREECAD_BIN=$FREECAD_MCP_FREECAD_BIN"
          echo "FREECAD_MCP_MODULE_DIR=$FREECAD_MCP_MODULE_DIR"
          ls -la "$FREECAD_MCP_FREECAD_BIN" || true
          ls -la "$FREECAD_MCP_MODULE_DIR/headless_server.py" || true
          python -m pytest tests/integration/ -v -rs --timeout=120
        timeout-minutes: 5
