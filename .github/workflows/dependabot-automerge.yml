name: Dependabot auto-merge

# Per-PR workflow that decides whether to enable auto-merge based on
# severity (for security PRs) or bump type (for version PRs).
#
# Safety belts:
#   1. Auto-merge only fires when ALL CI checks pass (tests.yml etc.).
#   2. Branch protection rule "Require branches to be up to date"
#      forces a rebase if main moved between CI pass and merge.
#   3. Stale-cleanup workflow nudges Dependabot to rebase PRs that
#      go untouched for >24h.
#
# Filter logic:
#   * Security PR (any severity)            → auto-merge enabled
#   * version-update:semver-patch           → auto-merge enabled
#   * version-update:semver-minor or -major → labeled for manual review
#   * Anything else                          → no action

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Ensure dependabot-needs-review label exists
        # gh pr edit --add-label fails if the label doesn't exist.
        # Create it once (idempotent — || true swallows the "already exists" error).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create dependabot-needs-review \
            --repo "${{ github.repository }}" \
            --color FBCA04 \
            --description "Dependabot PR needs human review (minor/major bump)" \
            2>/dev/null || true

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge security updates
        # alert-state is set only on security PRs (regardless of severity).
        # Security fixes auto-merge whenever CI passes — we want them in fast.
        if: steps.meta.outputs.alert-state != ''
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch version updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label minor/major bumps for manual review
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_NUMBER" --add-label "dependabot-needs-review"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fallback for "update X requirement from A to B" PRs (constraint
      # bumps in pyproject.toml/requirements.txt). For these, Dependabot
      # leaves update-type empty because no specific version is being
      # pinned. Parse the title's "from … to …" text to detect patch
      # bumps (same major.minor); label everything else for review.
      - name: Classify constraint-update PRs by title
        if: steps.meta.outputs.update-type == '' || steps.meta.outputs.update-type == null
        env:
          TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Extract "from <prev>" and "to <new>" version triples (X.Y.Z).
          prev=$(printf '%s\n' "$TITLE" | sed -nE 's/.*from [^0-9]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')
          new=$(printf '%s\n' "$TITLE" | sed -nE 's/.*to [^0-9]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')

          if [ -n "$prev" ] && [ -n "$new" ]; then
            prev_mm=$(echo "$prev" | cut -d. -f1,2)
            new_mm=$(echo "$new" | cut -d. -f1,2)
            if [ "$prev_mm" = "$new_mm" ] && [ "$prev" != "$new" ]; then
              echo "Patch-only constraint bump: $prev → $new — enabling auto-merge"
              gh pr merge --auto --merge "$PR_URL"
              exit 0
            fi
          fi

          echo "Not a patch-only bump (prev='$prev' new='$new') — labeling for review"
          gh pr edit "$PR_NUMBER" --add-label "dependabot-needs-review"
